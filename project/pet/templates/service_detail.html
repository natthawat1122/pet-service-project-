<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: linear-gradient(135deg, #fff7fb, #f0f7ff);
            min-height: 100vh;
        }
        .detail-card{
            background: white;
            border-radius: 28px;
            box-shadow: 0 18px 35px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .detail-card img{
            width: 100%;
            height: 420px;
            object-fit: cover;
        }
        .price{
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff6fa1;
        }
        .badge-soft{
            display: inline-block;
            background: linear-gradient(90deg, #ffd6e7, #fce7b2);
            color: #7b5ea7;
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .btn-main{
            background: linear-gradient(90deg, #ff9ec4, #cdb4ff);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            padding: 12px 18px;
        }
        .btn-main:hover{
            opacity: 0.92;
            color: white;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="mb-4">
        <a href="{% url 'home' %}" class="btn btn-outline-dark rounded-pill">← กลับหน้าแรก</a>
    </div>

    <div class="detail-card">
        <div class="row g-0">
            <div class="col-md-6">
                {% if item.image %}
                    <img src="{{ item.image.url }}" alt="{{ item.name }}">
                {% else %}
                    <img src="https://via.placeholder.com/800x600?text=Pet+Service" alt="No image">
                {% endif %}
            </div>

            <div class="col-md-6 p-4 p-lg-5">
                <span class="badge-soft">{{ item.category.name }}</span>
                <h1 class="fw-bold mb-3">{{ item.name }}</h1>
                <p class="text-muted mb-3">{{ item.description }}</p>
                <p class="price mb-4">{{ item.price }} บาท</p>

                {% if user.is_authenticated %}
                    <a href="{% url 'add_to_cart' item.id %}" class="btn btn-main btn-lg">เพิ่มลงตะกร้า</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-dark btn-lg">เข้าสู่ระบบเพื่อจอง</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>

</body>
</html>
