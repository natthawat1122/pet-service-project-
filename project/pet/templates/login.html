<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg, #fff0f6, #f0f7ff);
    min-height: 100vh;
    display: flex;
    align-items: center;
}

.auth-box{
    max-width: 420px;
    margin: auto;
    background: white;
    padding: 35px;
    border-radius: 28px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.auth-box h2{
    text-align: center;
    margin-bottom: 25px;
    font-weight: 800;
    color: #7b5ea7;
}

.form-control{
    border-radius: 12px;
    padding: 12px;
}

.btn-main{
    background: linear-gradient(90deg, #ff9ec4, #cdb4ff);
    border: none;
    border-radius: 12px;
    font-weight: 700;
}

.btn-main:hover{
    opacity: 0.9;
}

.link{
    color: #7b5ea7;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="auth-box">
    <h2>🐶 เข้าสู่ระบบ</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-main w-100 mt-2">เข้าสู่ระบบ</button>
    </form>

    <p class="text-center mt-3">
        ยังไม่มีบัญชี? <a href="{% url 'signup' %}" class="link">สมัครสมาชิก</a>
    </p>
</div>

</body>
</html>
