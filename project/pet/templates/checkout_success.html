<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สั่งจองสำเร็จ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: linear-gradient(135deg, #fff7fb, #f0f7ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .success-box{
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 45px;
            border-radius: 30px;
            box-shadow: 0 18px 35px rgba(0,0,0,0.08);
            text-align: center;
        }
        .btn-main{
            background: linear-gradient(90deg, #ff9ec4, #cdb4ff);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            padding: 12px 18px;
        }
        .btn-main:hover{
            opacity: 0.92;
            color: white;
        }
    </style>
</head>
<body>

<div class="success-box">
    <h1 class="mb-3">🎉 สั่งจองสำเร็จ</h1>
    <p class="text-muted mb-4">ระบบได้รับคำสั่งจองของคุณเรียบร้อยแล้ว กรุณาตรวจสอบสถานะในหน้าออเดอร์ของฉัน</p>

    <div class="d-flex justify-content-center gap-2">
        <a href="{% url 'home' %}" class="btn btn-outline-dark">กลับหน้าแรก</a>
        <a href="{% url 'my_orders' %}" class="btn btn-main">ดูออเดอร์ของฉัน</a>
    </div>
</div>

</body>
</html>
